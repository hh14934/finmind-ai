services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: finmind-postgres
    environment:
      POSTGRES_DB: finmind
      POSTGRES_USER: finmind
      POSTGRES_PASSWORD: finmind
    ports:
      - "5432:5432"
    volumes:
      - finmind_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finmind -d finmind"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  finmind_pgdata:
